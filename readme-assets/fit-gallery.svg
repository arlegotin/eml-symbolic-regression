<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="700" viewBox="0 0 1000 700" role="img" aria-labelledby="title desc">
  <title id="title">v1.13 fit gallery</title>
  <desc id="desc">Four panels showing two verified overlays and two unsupported targets with no verified candidate published.</desc>
  <style>
    .title { font: 700 26px Arial, sans-serif; fill: #1d252c; }
    .subtitle { font: 400 14px Arial, sans-serif; fill: #52616f; }
    .panel-title { font: 700 17px Arial, sans-serif; fill: #1d252c; }
    .small { font: 400 13px Arial, sans-serif; fill: #52616f; }
    .axis { stroke: #24313a; stroke-width: 1.3; }
    .grid { stroke: #d8dee5; stroke-width: 1; }
    .target { fill: none; stroke: #1d252c; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    .candidate { fill: none; stroke: #2f6f8f; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; opacity: 0.76; }
    .unsupported { fill: none; stroke: #d1495b; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; opacity: 0.5; stroke-dasharray: 8 8; }
    .sample { fill: #ffffff; stroke: #1d252c; stroke-width: 1.5; }
    .badge-ok { fill: #edf6f1; stroke: #4f8a3a; stroke-width: 1.2; }
    .badge-warn { fill: #fff4ef; stroke: #d1495b; stroke-width: 1.2; }
    .badge-text { font: 700 12px Arial, sans-serif; fill: #1d252c; }
  </style>

  <rect width="1000" height="700" fill="#ffffff"/>
  <text x="48" y="44" class="title">What the v1.13 examples look like</text>
  <text x="48" y="70" class="subtitle">Verified overlays mean the exact snapped candidate passed the verifier. Unsupported panels show targets where no verified candidate is published.</text>

  <!-- Panel 1 -->
  <text x="75" y="112" class="panel-title">exp: basis-only compile verified</text>
  <text x="75" y="134" class="small">target and exact candidate overlap</text>
  <line x1="90" y1="330" x2="460" y2="330" class="axis"/>
  <line x1="90" y1="150" x2="90" y2="330" class="axis"/>
  <line x1="90" y1="270" x2="460" y2="270" class="grid"/>
  <line x1="90" y1="210" x2="460" y2="210" class="grid"/>
  <path d="M110 306 C165 296 215 276 260 244 C310 207 365 162 440 112" class="candidate"/>
  <path d="M110 306 C165 296 215 276 260 244 C310 207 365 162 440 112" class="target"/>
  <circle cx="110" cy="306" r="4" class="sample"/>
  <circle cx="180" cy="290" r="4" class="sample"/>
  <circle cx="250" cy="251" r="4" class="sample"/>
  <circle cx="320" cy="199" r="4" class="sample"/>
  <circle cx="390" cy="145" r="4" class="sample"/>
  <rect x="300" y="305" width="135" height="28" class="badge-ok" rx="6"/>
  <text x="316" y="324" class="badge-text">verified recovery</text>

  <!-- Panel 2 -->
  <text x="545" y="112" class="panel-title">Beer-Lambert: literal warm-start</text>
  <text x="545" y="134" class="small">same-AST return, verifier passed</text>
  <line x1="560" y1="330" x2="930" y2="330" class="axis"/>
  <line x1="560" y1="150" x2="560" y2="330" class="axis"/>
  <line x1="560" y1="270" x2="930" y2="270" class="grid"/>
  <line x1="560" y1="210" x2="930" y2="210" class="grid"/>
  <path d="M580 162 C640 194 692 232 742 264 C800 297 862 315 910 322" class="candidate"/>
  <path d="M580 162 C640 194 692 232 742 264 C800 297 862 315 910 322" class="target"/>
  <circle cx="580" cy="162" r="4" class="sample"/>
  <circle cx="650" cy="202" r="4" class="sample"/>
  <circle cx="720" cy="252" r="4" class="sample"/>
  <circle cx="790" cy="292" r="4" class="sample"/>
  <circle cx="860" cy="314" r="4" class="sample"/>
  <rect x="770" y="305" width="140" height="28" class="badge-ok" rx="6"/>
  <text x="786" y="324" class="badge-text">same-AST return</text>

  <!-- Panel 3 -->
  <text x="75" y="410" class="panel-title">Logistic: unsupported in v1.13</text>
  <text x="75" y="432" class="small">target shown; no verified EML candidate claimed</text>
  <line x1="90" y1="628" x2="460" y2="628" class="axis"/>
  <line x1="90" y1="448" x2="90" y2="628" class="axis"/>
  <line x1="90" y1="568" x2="460" y2="568" class="grid"/>
  <line x1="90" y1="508" x2="460" y2="508" class="grid"/>
  <path d="M110 595 C175 594 212 577 242 535 C280 481 325 455 440 455" class="target"/>
  <path d="M110 596 C188 582 250 552 310 514 C365 480 405 462 440 458" class="unsupported"/>
  <circle cx="110" cy="595" r="4" class="sample"/>
  <circle cx="185" cy="590" r="4" class="sample"/>
  <circle cx="260" cy="510" r="4" class="sample"/>
  <circle cx="335" cy="465" r="4" class="sample"/>
  <circle cx="410" cy="456" r="4" class="sample"/>
  <rect x="288" y="604" width="150" height="28" class="badge-warn" rx="6"/>
  <text x="307" y="623" class="badge-text">unsupported gate</text>

  <!-- Panel 4 -->
  <text x="545" y="410" class="panel-title">Planck: unsupported in v1.13</text>
  <text x="545" y="432" class="small">peak-and-tail shape remains stretch evidence</text>
  <line x1="560" y1="628" x2="930" y2="628" class="axis"/>
  <line x1="560" y1="448" x2="560" y2="628" class="axis"/>
  <line x1="560" y1="568" x2="930" y2="568" class="grid"/>
  <line x1="560" y1="508" x2="930" y2="508" class="grid"/>
  <path d="M580 615 C614 585 645 505 688 493 C742 477 807 548 910 611" class="target"/>
  <path d="M580 616 C640 610 693 600 752 585 C812 568 865 560 910 558" class="unsupported"/>
  <circle cx="580" cy="615" r="4" class="sample"/>
  <circle cx="650" cy="506" r="4" class="sample"/>
  <circle cx="720" cy="500" r="4" class="sample"/>
  <circle cx="790" cy="541" r="4" class="sample"/>
  <circle cx="860" cy="590" r="4" class="sample"/>
  <rect x="758" y="604" width="150" height="28" class="badge-warn" rx="6"/>
  <text x="777" y="623" class="badge-text">unsupported gate</text>

  <line x1="250" y1="668" x2="292" y2="668" class="target"/>
  <text x="305" y="672" class="small">target</text>
  <line x1="388" y1="668" x2="430" y2="668" class="candidate"/>
  <text x="443" y="672" class="small">verified candidate overlay</text>
  <line x1="620" y1="668" x2="662" y2="668" class="unsupported"/>
  <text x="675" y="672" class="small">not a verified candidate</text>
</svg>
