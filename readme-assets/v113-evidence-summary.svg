<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" role="img" aria-labelledby="title desc">
  <title id="title">v1.13 release evidence summary</title>
  <desc id="desc">Stacked bars showing basis-only, literal-constant, and combined recovery denominators for v1.13.</desc>
  <style>
    .title { font: 700 26px Arial, sans-serif; fill: #1d252c; }
    .subtitle { font: 400 14px Arial, sans-serif; fill: #52616f; }
    .label { font: 700 15px Arial, sans-serif; fill: #1d252c; }
    .small { font: 400 13px Arial, sans-serif; fill: #52616f; }
    .number { font: 700 20px Arial, sans-serif; fill: #1d252c; }
    .inside { font: 700 13px Arial, sans-serif; fill: #ffffff; }
    .inside-dark { font: 700 13px Arial, sans-serif; fill: #1d252c; }
    .axis { stroke: #c7d0d9; stroke-width: 1; }
    .recovered { fill: #2f6f8f; }
    .unsupported { fill: #d8dee5; }
    .failed { fill: #d1495b; }
    .ok { fill: #edf6f1; stroke: #4f8a3a; stroke-width: 1.2; }
    .note { fill: #f7f9fb; stroke: #c7d0d9; stroke-width: 1.2; }
  </style>

  <rect width="1000" height="470" fill="#ffffff"/>
  <text x="48" y="48" class="title">v1.13 release evidence, split by denominator</text>
  <text x="48" y="74" class="subtitle">The release keeps basis-only compile evidence separate from literal-constant warm-start evidence.</text>

  <rect x="50" y="110" width="18" height="18" class="recovered" rx="3"/>
  <text x="76" y="124" class="small">verifier recovered</text>
  <rect x="215" y="110" width="18" height="18" class="unsupported" rx="3"/>
  <text x="241" y="124" class="small">unsupported, kept in denominator</text>
  <rect x="474" y="110" width="18" height="18" class="failed" rx="3"/>
  <text x="500" y="124" class="small">failed execution or failed fit</text>

  <line x1="230" y1="164" x2="830" y2="164" class="axis"/>
  <line x1="230" y1="254" x2="830" y2="254" class="axis"/>
  <line x1="230" y1="344" x2="830" y2="344" class="axis"/>

  <text x="50" y="174" class="label">basis-only compile</text>
  <text x="50" y="197" class="small">12 rows, strict constants policy</text>
  <rect x="230" y="145" width="50" height="38" class="recovered" rx="6"/>
  <rect x="280" y="145" width="550" height="38" class="unsupported" rx="6"/>
  <text x="249" y="169" class="inside">1</text>
  <text x="528" y="169" class="inside-dark">11 unsupported</text>
  <text x="850" y="170" class="number">8.3%</text>

  <text x="50" y="264" class="label">literal constants</text>
  <text x="50" y="287" class="small">12 rows, warm-start seeds explicit</text>
  <rect x="230" y="235" width="400" height="38" class="recovered" rx="6"/>
  <rect x="630" y="235" width="200" height="38" class="unsupported" rx="6"/>
  <text x="415" y="259" class="inside">8 recovered</text>
  <text x="706" y="259" class="inside-dark">4</text>
  <text x="850" y="260" class="number">66.7%</text>

  <text x="50" y="354" class="label">combined release table</text>
  <text x="50" y="377" class="small">24 rows, no failed executions</text>
  <rect x="230" y="325" width="225" height="38" class="recovered" rx="6"/>
  <rect x="455" y="325" width="375" height="38" class="unsupported" rx="6"/>
  <text x="320" y="349" class="inside">9 recovered</text>
  <text x="600" y="349" class="inside-dark">15 unsupported</text>
  <text x="850" y="350" class="number">37.5%</text>

  <rect x="50" y="410" width="270" height="34" class="ok" rx="7"/>
  <text x="68" y="432" class="small">claim audit: passed</text>
  <rect x="340" y="410" width="270" height="34" class="ok" rx="7"/>
  <text x="358" y="432" class="small">release gate: passed</text>
  <rect x="630" y="410" width="320" height="34" class="note" rx="7"/>
  <text x="648" y="432" class="small">evidence kind: 1 compile-only, 8 same-AST</text>
</svg>
