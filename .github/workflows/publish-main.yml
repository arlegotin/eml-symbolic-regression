name: Publish main

on:
  push:
    branches:
      - dev

permissions:
  contents: write

concurrency:
  group: publish-main
  cancel-in-progress: false

jobs:
  publish:
    name: Publish main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          persist-credentials: true

      - name: Publish main
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main:refs/remotes/origin/main
          expected_main="$(git rev-parse refs/remotes/origin/main)"

          git checkout --orphan sanitized-main
          git rm -r -f --ignore-unmatch \
            AGENTS.md \
            .github \
            .planning \
            docs \
            sources

          # Keep public-facing reports, tables, figures, manifests, and audits,
          # but drop raw run payloads, duplicated source bundles, and large traces.
          git ls-files -z -- \
            ':(glob)artifacts/.DS_Store' \
            ':(glob)artifacts/**/.DS_Store' \
            ':(glob)artifacts/**/runs/**' \
            ':(glob)artifacts/**/raw-runs/**' \
            ':(glob)artifacts/**/suite-result.json' \
            ':(glob)artifacts/**/*-suite-result.json' \
            ':(glob)artifacts/**/aggregate.json' \
            ':(glob)artifacts/**/*-aggregate.json' \
            ':(glob)artifacts/**/training-step-traces.json' \
            ':(glob)artifacts/**/training-step-traces.csv' \
            ':(glob)artifacts/**/training-step-traces.md' \
            ':(glob)artifacts/paper/**/sources/**' \
            | while IFS= read -r -d '' artifact_path; do
                git rm -r -f --ignore-unmatch -- "$artifact_path"
              done

          if git diff --cached --quiet; then
            echo "Sanitized snapshot is empty; refusing to publish main."
            exit 1
          fi

          git commit -m "Update"
          git branch -M main
          git push \
            --force-with-lease=refs/heads/main:"${expected_main}" \
            origin main:main
